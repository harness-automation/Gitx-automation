pipeline:
    name: Remote01July-1
    identifier: Remote01July1
    projectIdentifier: AmitTest
    orgIdentifier: default
    tags: {}
    stages:
        - stage:
              name: A1
              identifier: A1
              description: desc_type
              type: Approval
              spec:
                  execution:
                      steps:
                          - step:
                                name: R1
                                identifier: R1
                                type: HarnessApproval
                                timeout: 1d
                                spec:
                                    approvalMessage: |-
                                        Please review the following information
                                        and approve the pipeline progression
                                    includePipelineExecutionHistory: true
                                    approvers:
                                        disallowPipelineExecutor: false
                                        userGroups: <+input>
                                        minimumCount: 1
                                    approverInputs: []
                                when:
                                    stageStatus: All
                                failureStrategies:
                                    - onFailure:
                                          errors:
                                              - AllErrors
                                          action:
                                              type: MarkAsSuccess
              tags: {}
